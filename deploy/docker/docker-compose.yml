services:
  server:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      LUMINA_CONNECTOR_TOKEN: ${LUMINA_CONNECTOR_TOKEN:?set LUMINA_CONNECTOR_TOKEN in deploy/docker/.env}
      LUMINA_DATA_DIR: /data
      LUMINA_WEB_DIST: /app/apps/web/dist
      LUMINA_MAX_JSON_BODY_BYTES: ${LUMINA_MAX_JSON_BODY_BYTES:-52428800}
    volumes:
      - ${LUMINA_HOST_DATA_DIR:-/opt/lumina-reading-room/data}:/data
    ports:
      - "127.0.0.1:8787:8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      LUMINA_DOMAIN: ${LUMINA_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"

volumes:
  caddy_data:
  caddy_config:
